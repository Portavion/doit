<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Doit</title>
    <link rel="icon" href="/favicon.ico?v=20260628-stationery" sizes="any">
    <link rel="icon" type="image/png" href="/favicon.png?v=20260628-stationery">
    <link rel="apple-touch-icon" href="/icon-192.png?v=20260628-stationery">
    <script>
      try {
        const colorscheme = localStorage.getItem("doit.colorscheme.v1");
        if (["everforest", "gruvbox", "rose-pine"].includes(colorscheme)) {
          document.documentElement.classList.add(`colorscheme-${colorscheme}`);
        }
      } catch {}
    </script>
    <link rel="stylesheet" href="/style.css?v=20260628-form-button-font">
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <div class="brand">
          <h1>Doit</h1>
          <p class="eyebrow">Today / capture / finish</p>
        </div>
        <div class="settings">
          <button id="settings-toggle" class="icon-button" type="button" aria-label="Open settings" aria-controls="settings-menu" aria-expanded="false">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 8.5a3.5 3.5 0 1 0 0 7 3.5 3.5 0 0 0 0-7Z"></path>
              <path d="M19.4 15a8.4 8.4 0 0 0 .1-1 8.4 8.4 0 0 0-.1-1l2-1.5-2-3.4-2.4 1a8.2 8.2 0 0 0-1.7-1L15 5.5h-4l-.3 2.6a8.2 8.2 0 0 0-1.7 1l-2.4-1-2 3.4 2 1.5a8.4 8.4 0 0 0-.1 1 8.4 8.4 0 0 0 .1 1l-2 1.5 2 3.4 2.4-1a8.2 8.2 0 0 0 1.7 1l.3 2.6h4l.3-2.6a8.2 8.2 0 0 0 1.7-1l2.4 1 2-3.4-2-1.5Z"></path>
            </svg>
          </button>
          <div id="settings-menu" class="settings-menu" hidden>
            <button id="declare-backlog" class="settings-action" type="button">Declare backlog</button>
            <button id="reset-cache" class="settings-action" type="button">Reset cache</button>
            <p>Colourscheme</p>
            <label><input type="radio" name="colorscheme" value="default"> Default</label>
            <label><input type="radio" name="colorscheme" value="everforest"> Everforest</label>
            <label><input type="radio" name="colorscheme" value="gruvbox"> Gruvbox</label>
            <label><input type="radio" name="colorscheme" value="rose-pine"> Rose Pine</label>
          </div>
        </div>
      </header>

      <form id="task-form" class="add-form">
        <label for="description">New task</label>
        <div class="add-row">
          <input id="description" name="description" maxlength="500" autocomplete="off" placeholder="Capture for tomorrow">
          <button id="submit" type="submit">Add</button>
        </div>
        <div class="command-strip">
          <button id="extra-fields-toggle" class="command-button" type="button" aria-controls="extra-fields" aria-expanded="false">...</button>
          <button id="extra-toggle" class="command-button" type="button" aria-pressed="false">Extra</button>
        </div>
        <div id="extra-fields" class="extra-fields" hidden>
          <label class="extra-field" for="uri-field">
            URI
            <input id="uri-field" class="extra-input" name="uri" inputmode="url" autocomplete="off" placeholder="https://example.com">
          </label>
          <label class="extra-field" for="project-field">
            Project
            <input id="project-field" class="extra-input" name="project" autocomplete="off" placeholder="Inbox">
          </label>
          <fieldset class="extra-field wait-field">
            <legend>Wait</legend>
            <input id="wait-field" class="extra-input" name="wait" type="date">
          </fieldset>
        </div>
      </form>

      <section class="toolbar">
        <button id="refresh" type="button">Refresh</button>
        <button id="session" type="button">Start</button>
        <button id="lucky" type="button">Lucky</button>
        <p id="status" hidden></p>
      </section>

      <nav class="mode-switch" aria-label="Task lists">
        <button id="mode-today" class="active" type="button" aria-pressed="true">Today</button>
        <button id="mode-backlog" type="button" aria-pressed="false">Backlog</button>
        <button id="mode-future" type="button" aria-pressed="false">Future</button>
      </nav>

      <label class="project-filter" for="project-filter">
        <span>Project</span>
        <select id="project-filter" name="project-filter"></select>
      </label>

      <div id="today-panel" class="workdeck">
        <div class="today-column">
          <section class="list-header">
            <h2>Today</h2>
            <p id="list-caption">Ready to start</p>
          </section>
          <ul id="tasks" class="tasks"></ul>
        </div>

        <aside class="extra-section" aria-labelledby="extra-heading">
          <section class="list-header extra-header">
            <h2 id="extra-heading">Side list</h2>
            <p id="extra-status">0 extra</p>
          </section>
          <ul id="extra-tasks" class="tasks extra-tasks"></ul>
        </aside>
      </div>

      <section id="backlog-panel" class="backlog-panel" hidden>
        <section class="list-header">
          <h2>Backlog</h2>
          <p id="backlog-status">0 backlog</p>
        </section>
        <ul id="backlog-tasks" class="tasks backlog-tasks"></ul>
      </section>

      <section id="future-panel" class="future-panel" hidden>
        <section class="list-header tomorrow-header">
          <h2>Future tasks</h2>
          <p id="tomorrow-status">0 future</p>
        </section>
        <ul id="tomorrow-tasks" class="tasks tomorrow-tasks"></ul>
        <section class="waiting-section" aria-labelledby="waiting-heading">
          <section class="list-header waiting-header">
            <h2 id="waiting-heading">Waiting</h2>
            <p id="waiting-status">0 waiting</p>
          </section>
          <ul id="waiting-tasks" class="tasks waiting-tasks"></ul>
        </section>
      </section>
    </main>

    <script src="/app.js?v=20260628-stable-load"></script>
  </body>
</html>
