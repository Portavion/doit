<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Doit</title>
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <script>
      try {
        const colorscheme = localStorage.getItem("doit.colorscheme.v1");
        if (["everforest", "gruvbox", "rose-pine"].includes(colorscheme)) {
          document.documentElement.classList.add(`colorscheme-${colorscheme}`);
        }
      } catch {}
    </script>
    <link rel="stylesheet" href="/style.css?v=20260607-input-selection">
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <div class="plane" aria-hidden="true">
          <span></span>
        </div>
        <div>
          <p class="eyebrow">Closed-list deck</p>
          <h1>Doit</h1>
        </div>
        <div class="champ" aria-hidden="true">
          <span class="head"></span>
          <span class="body"></span>
          <span class="shoe left"></span>
          <span class="shoe right"></span>
        </div>
        <div class="settings">
          <button id="settings-toggle" class="icon-button" type="button" aria-label="Open settings" aria-controls="settings-menu" aria-expanded="false">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 8.5a3.5 3.5 0 1 0 0 7 3.5 3.5 0 0 0 0-7Z"></path>
              <path d="M19.4 15a8.4 8.4 0 0 0 .1-1 8.4 8.4 0 0 0-.1-1l2-1.5-2-3.4-2.4 1a8.2 8.2 0 0 0-1.7-1L15 5.5h-4l-.3 2.6a8.2 8.2 0 0 0-1.7 1l-2.4-1-2 3.4 2 1.5a8.4 8.4 0 0 0-.1 1 8.4 8.4 0 0 0 .1 1l-2 1.5 2 3.4 2.4-1a8.2 8.2 0 0 0 1.7 1l.3 2.6h4l.3-2.6a8.2 8.2 0 0 0 1.7-1l2.4 1 2-3.4-2-1.5Z"></path>
            </svg>
          </button>
          <div id="settings-menu" class="settings-menu" hidden>
            <button id="reset-cache" class="settings-action" type="button">Reset cache</button>
            <p>Colourscheme</p>
            <label><input type="radio" name="colorscheme" value="default"> Default</label>
            <label><input type="radio" name="colorscheme" value="everforest"> Everforest</label>
            <label><input type="radio" name="colorscheme" value="gruvbox"> Gruvbox</label>
            <label><input type="radio" name="colorscheme" value="rose-pine"> Rose Pine</label>
          </div>
        </div>
      </header>

      <form id="task-form" class="add-form">
        <label for="description">Capture for tomorrow</label>
        <div class="add-row">
          <input id="description" name="description" maxlength="500" autocomplete="off" placeholder="Add a tiny mission">
          <button id="submit" type="submit">Add</button>
        </div>
        <div class="command-strip">
          <button id="uri-toggle" class="command-button" type="button" aria-controls="uri-field" aria-expanded="false">URI</button>
        </div>
        <input id="uri-field" class="uri-input" name="uri" inputmode="url" autocomplete="off" placeholder="https://example.com" hidden>
      </form>

      <section class="toolbar">
        <button id="refresh" type="button">Refresh</button>
        <button id="session" type="button">Start</button>
        <p id="status" hidden></p>
      </section>

      <section class="list-header">
        <h2>To-do list</h2>
        <p id="list-caption">Ready to start</p>
      </section>
      <ul id="tasks" class="tasks"></ul>

      <section class="list-header tomorrow-header">
        <h2>Future tasks</h2>
        <p id="tomorrow-status">0 future</p>
      </section>
      <ul id="tomorrow-tasks" class="tasks tomorrow-tasks"></ul>
    </main>

    <script src="/app.js?v=20260607-annotation-scroll"></script>
  </body>
</html>
